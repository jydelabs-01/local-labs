apiVersion: v1
kind: Pod
metadata:
  labels:
    run: data-exchange
  name: data-exchange
spec:
  containers:
  - image: busybox:1.36.1
    name: main-app
    command: ["/bin/sh"]
    args: ["-c", 'counter=1; while true; do touch "/var/app/data/$counter-data.txt"; counter=$((counter+1)); sleep 30; done']
    volumeMounts:
    - mountPath: "/var/app/data"
      name: log-volume
    resources: {}
  - image: busybox:1.36.1
    name: sidecar
    command: ["/bin/sh"]
    args: ["-c", 'while true; do ls -d /var/app/data/*-data.txt | wc -l ; sleep 30; done']
    volumeMounts:
    - mountPath: "/var/app/data"
      name: log-volume
  dnsPolicy: ClusterFirst
  restartPolicy: Never
  volumes:
  - name: log-volume
    emptyDir: {}
status: {}
