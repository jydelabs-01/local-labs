apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
spec:
  containers:
  - name: test-container
    image: busybox:1.36.1
    command: ["/bin/sh", "-c",]
    args:
      - |
        echo "Secrets mounted at /tmp/secrets:"
        ls -l /tmp/secret
        echo "Environment variables:"
        env
        sleep 3600
    volumeMounts:
    - mountPath: /tmp/secret
      name: mysecret
  volumes:
  - name: mysecret
    secret:
      secretName: mysecret
