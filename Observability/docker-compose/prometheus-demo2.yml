global:
  scrape_interval: 20s  # default 1m 

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
    - targets: ['localhost:9090']  
  
  - job_name: 'linux'
    static_configs:
      - targets: ['172.17.0.2:9100']
        labels:
          os: linux
          runtime: container
      
  - job_name: 'batch'
    static_configs:
      - targets: ['172.17.0.2:80']
        labels: 
          os: linux
          runtime: container

  - job_name: 'linuxOS VM'
    static_configs:
      - targets: ['172.16.94.134:9100']
        labels:
          os: linux
          runtime: vm

